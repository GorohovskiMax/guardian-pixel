model:
  backbone: convnext_large
  num_classes: 7
  input_resolution: 200
  fsr: true

training:
  seed: 42
  epochs: 50
  batch_size: 32
  learning_rate: 1e-4
  optimizer: adam
  label_smoothing: 0.05
  scheduler:
    type: exponential_decay
    decay_rate: 0.96
    decay_steps: 1000
  checkpoint_dir: "models/layer_a"

logging:
  wandb_run_name: "layer_a_fsr_v1"

data:
  # Overridden at runtime in the notebook — these are fallback placeholders only.
  csv_path:      "/content/drive/MyDrive/Kaggle_Datasets/master_metadata.csv"
  artifact_root: "/content/ArtiFact"
  num_workers: 4
